[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --log-cli-level=INFO

markers =
    ui_smoke: UI smoke test (mocked API, no backend needed)
    integration: Integration test (requires running backend + API keys)
    p0: P0 level test - legacy, use integration instead
    p1: P1 level test - legacy
    p2: P2 level test - legacy
    chat_core: Chat core functionality
    chat_context: Chat context awareness
    chat_file: Chat file upload
    chat_session: Chat session management
    chat_advanced: Chat advanced features
    chat_validation: Chat input validation
    agents_list: Agents list view
    agents_crud: Agents CRUD operations
    agents_toggle: Agents enable/disable
    agents_sort: Agents drag sort
    channels_list: Channels grid view
    channels_filter: Channels filter tabs
    channels_toggle: Channels enable/disable
    sessions_list: Sessions table view
    sessions_filter: Sessions filter
    sessions_actions: Sessions actions
    cronjobs_list: CronJobs table view
    cronjobs_crud: CronJobs CRUD operations
    heartbeat_config: Heartbeat configuration
    models_list: Models provider list
    models_config: Models provider config
    models_manage: Models enable/disable
    security_tabs: Security tabs navigation
    envs_list: Environments list view
    envs_crud: Environments CRUD
    backups_list: Backups list view
    backups_create: Backups create
    login_form: Login form rendering
    login_flow: Login flow validation
    login_redirect: Login redirect behavior
    test_id: Test case ID

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

log_cli = true
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S